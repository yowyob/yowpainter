name: Publish Docker image (GHCR)
on:
  push:
    branches: [main]
    paths-ignore: ["**.md", "docs/**"]
  workflow_dispatch:
jobs:
  build:
    if: github.repository == 'yowyob/yowpainter'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        run: |
          REPO="${GITHUB_REPOSITORY,,}"
          echo "image=ghcr.io/${REPO}" >> "$GITHUB_OUTPUT"
          echo "sha=sha-${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha }}
            ${{ steps.meta.outputs.image }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max
