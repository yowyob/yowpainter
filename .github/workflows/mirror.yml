name: Mirror from source
on:
  repository_dispatch:
    types: [upstream-push]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
concurrency:
  group: mirror-yowpainter
  cancel-in-progress: true
jobs:
  mirror:
    if: github.repository == 'yowyob/yowpainter'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      UPSTREAM: https://github.com/NguetchuissiBrunel/YP-backend.git
      UPSTREAM_BRANCH: main
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Sync (préserve fichiers de déploiement)
        env:
          MIRROR_PUSH_TOKEN: ${{ secrets.UPSTREAM_TOKEN }}
        run: |
          git config user.name "yowyob-mirror"
          git config user.email "mirror@yowyob.local"
          git remote add upstream "${UPSTREAM/https:\/\/github.com\//https://x-access-token:${MIRROR_PUSH_TOKEN}@github.com/}"
          git fetch --quiet upstream "$UPSTREAM_BRANCH"
          git checkout upstream/"$UPSTREAM_BRANCH" -- . ':!.github' ':!docker-compose.prod.yml'
          if git diff --cached --quiet; then echo "no change"; exit 0; fi
          git commit -m "mirror: sync https://github.com/NguetchuissiBrunel/YP-backend.git@$UPSTREAM_BRANCH"
          git push "https://x-access-token:${MIRROR_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main